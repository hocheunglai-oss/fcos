name: Outstanding Buyer Invoices Report

on:
  schedule:
    # 08:00 and 14:00 Hong Kong time, Monday to Friday.
    - cron: '0 0,6 * * 1-5'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger report email
        run: |
          curl --fail-with-body \
            --request POST \
            --header "content-type: application/json" \
            --data '{}' \
            "https://fcos.vercel.app/api/functions/outstandingBuyerInvoicesEmailReport"
